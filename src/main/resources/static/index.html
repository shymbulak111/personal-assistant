<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Персональный Ассистент</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,textarea,select{font-family:inherit;outline:none}
:root{
  --bg0:#08080e;--bg1:#0d0d16;--bg2:#13131e;--bg3:#1a1a28;
  --s0:#08080e;--s1:#0d0d16;--s2:#13131e;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);--br:rgba(255,255,255,.06);
  --t1:#f0eeff;--t2:#9b96c8;--t3:#4a476a;
  --v:#8b5cf6;--ac:#8b5cf6;--vd:rgba(139,92,246,.18);--vg:rgba(139,92,246,.35);
  --green:#4ade80;--amber:#fbbf24;--red:#f87171;--blue:#60a5fa;
  --sw:230px;--r:12px;--rs:8px
}
body.light{
  --bg0:#f4f4fb;--bg1:#ffffff;--bg2:#ededf7;--bg3:#e4e4f2;
  --s0:#f4f4fb;--s1:#ffffff;--s2:#ededf7;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.13);--br:rgba(0,0,0,.07);
  --t1:#0c0c1a;--t2:#565380;--t3:#a09cbe;
  --v:#6d28d9;--ac:#6d28d9;--vd:rgba(109,40,217,.1);--vg:rgba(109,40,217,.18);
  --green:#16a34a;--amber:#d97706;--red:#dc2626;--blue:#2563eb;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}

/* ── AUTH ── */
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(139,92,246,.13) 0%,transparent 70%)}
.auth-card{background:var(--bg1);border:1px solid var(--border2);border-radius:20px;padding:40px;
  width:100%;max-width:420px;box-shadow:0 0 80px rgba(139,92,246,.08)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;letter-spacing:-1px;text-align:center;margin-bottom:6px}
.logo span{color:var(--v)}
.tagline{text-align:center;font-size:13px;color:var(--t2);margin-bottom:28px}
.tabs{display:flex;background:var(--bg2);border-radius:var(--rs);padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:8px;border-radius:6px;font-size:13px;font-weight:500;background:transparent;color:var(--t2);transition:.15s}
.tab.on{background:var(--bg3);color:var(--t1)}
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:600;color:var(--t3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);color:var(--t1);font-size:14px;transition:.15s}
.fi:focus{border-color:var(--v)}
.fi::placeholder{color:var(--t3)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
textarea.fi{resize:vertical;min-height:80px}
.btn-p{width:100%;padding:12px;background:var(--v);border-radius:var(--rs);color:#fff;font-size:14px;font-weight:600;
  margin-top:8px;transition:.15s}
.btn-p:hover{opacity:.88}
.btn-p:disabled{opacity:.45;cursor:not-allowed}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh}
.sb{width:var(--sw);min-height:100vh;background:var(--bg1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;padding:18px 10px}
.sb-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;letter-spacing:-.5px;
  padding:6px 10px 18px;color:var(--t1)}
.sb-logo span{color:var(--v)}
.sb-nav{flex:1;display:flex;flex-direction:column;gap:2px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--rs);
  color:var(--t2);font-size:13.5px;font-weight:500;cursor:pointer;transition:.13s;user-select:none}
.ni:hover{background:var(--bg2);color:var(--t1)}
.ni.on{background:var(--vd);color:var(--v)}
.ni svg{width:17px;height:17px;flex-shrink:0}
.sb-foot{border-top:1px solid var(--border);padding-top:10px;margin-top:4px}
.uinfo{padding:8px 10px;display:flex;align-items:center;gap:9px;margin-bottom:4px}
.uav{width:30px;height:30px;background:var(--vd);border:1px solid var(--v);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--v);flex-shrink:0}
.uname{font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uemail{font-size:10.5px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-out{width:100%;padding:8px 10px;border-radius:var(--rs);background:transparent;color:var(--red);
  font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;opacity:.65;transition:.15s}
.btn-out:hover{opacity:1;background:rgba(248,113,113,.09)}

/* ── MAIN ── */
.mn{margin-left:var(--sw);flex:1;padding:30px 34px;min-height:100vh}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px}
.pt{font-family:'Syne',sans-serif;font-size:23px;font-weight:700;letter-spacing:-.4px;color:var(--t1)}
.ps{font-size:13px;color:var(--t2);margin-top:3px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--rs);
  font-size:13px;font-weight:500;cursor:pointer;transition:.13s}
.btn-v{background:var(--v);color:#fff;border:none}
.btn-v:hover{opacity:.87}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--border2)}
.btn-g:hover{background:var(--bg3);color:var(--t1)}
.btn-d{background:transparent;color:var(--red);border:1px solid rgba(248,113,113,.2)}
.btn-d:hover{background:rgba(248,113,113,.09)}
.bic{padding:5px;background:transparent;color:var(--t3);border:none;border-radius:6px;transition:.13s;line-height:0}
.bic:hover{color:var(--t1);background:var(--bg3)}
.bsm{padding:4px 10px;font-size:12px;border-radius:6px}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;transition:.15s}
.card:hover{border-color:var(--border2)}

/* ── STATS ── */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc.cv::before{background:var(--v)}
.sc.cg::before{background:var(--green)}
.sc.ca::before{background:var(--amber)}
.sc.cb::before{background:var(--blue)}
.sc.cr::before{background:var(--red)}
.sl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
.sv{font-family:'Syne',sans-serif;font-size:30px;font-weight:700;color:var(--t1);line-height:1;margin-bottom:5px}
.ss{font-size:12px;color:var(--t2)}
.sico{position:absolute;right:16px;top:14px;font-size:28px;opacity:.1}

/* ── FILTER BAR ── */
.fb{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.fbt{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;background:var(--bg2);
  border:1px solid var(--border);color:var(--t2);cursor:pointer;transition:.13s}
.fbt:hover{border-color:var(--border2);color:var(--t1)}
.fbt.on{background:var(--vd);border-color:var(--v);color:var(--v)}
.sep{width:1px;height:20px;background:var(--border);margin:0 2px}

/* ── TASKS ── */
.tl{display:flex;flex-direction:column;gap:7px}
.ti{background:var(--bg2);border:1px solid var(--border);border-left:3px solid transparent;
  border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:11px;transition:.13s}
.ti:hover{border-color:var(--border2)}
.ti.pl{border-left-color:#64748b}
.ti.pm{border-left-color:var(--blue)}
.ti.ph2{border-left-color:var(--amber)}
.ti.pc{border-left-color:var(--red)}
.ti.sd{opacity:.55}
.chk{width:17px;height:17px;border:1.5px solid var(--border2);border-radius:50%;flex-shrink:0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.13s}
.chk:hover{border-color:var(--v);background:var(--vd)}
.chk.ck{background:var(--green);border-color:var(--green)}
.chk svg{width:9px;height:9px;stroke:#fff;display:none}
.chk.ck svg{display:block}
.tb{flex:1;min-width:0}
.tt{font-size:13.5px;font-weight:500;color:var(--t1);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti.sd .tt{text-decoration:line-through;color:var(--t3)}
.tm{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.tac{display:flex;gap:3px;opacity:0;transition:.13s}
.ti:hover .tac{opacity:1}
.tdue{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3)}

/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;
  font-size:10.5px;font-weight:600;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.2px}
.bdg-todo{background:rgba(74,71,106,.25);color:#9896c8}
.bdg-in_progress{background:rgba(96,165,250,.13);color:var(--blue)}
.bdg-done{background:rgba(74,222,128,.13);color:var(--green)}
.bdg-cancelled{background:rgba(74,71,106,.15);color:var(--t3)}
.bdg-low{background:rgba(100,116,139,.18);color:#94a3b8}
.bdg-medium{background:rgba(96,165,250,.13);color:var(--blue)}
.bdg-high{background:rgba(251,191,36,.13);color:var(--amber)}
.bdg-critical{background:rgba(248,113,113,.13);color:var(--red)}
.bdg-pending{background:rgba(251,191,36,.13);color:var(--amber)}
.bdg-sent{background:rgba(74,222,128,.13);color:var(--green)}

/* ── NOTES ── */
.ng{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.nc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;
  position:relative;transition:.15s;cursor:default}
.nc:hover{border-color:var(--border2);transform:translateY(-1px)}
.nc.pn{border-color:rgba(139,92,246,.28)}
.npin{position:absolute;top:13px;right:13px;opacity:.3;font-size:14px}
.nc.pn .npin{opacity:1}
.ntit{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:6px;padding-right:20px}
.ncnt{font-size:12.5px;color:var(--t2);line-height:1.6;display:-webkit-box;
  -webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.nft{display:flex;align-items:center;justify-content:space-between;margin-top:12px;
  padding-top:10px;border-top:1px solid var(--border)}
.ndt{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--t3)}
.nac{display:flex;gap:2px}

/* ── REMINDERS ── */
.rl{display:flex;flex-direction:column;gap:9px}
.ri{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;
  display:flex;align-items:center;gap:13px;transition:.13s}
.ri:hover{border-color:var(--border2)}
.rdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.rdot.pending{background:var(--amber);box-shadow:0 0 7px rgba(251,191,36,.5)}
.rdot.sent{background:var(--green)}
.rdot.cancelled{background:var(--t3)}
.rb{flex:1;min-width:0}
.rtit{font-size:13.5px;font-weight:500;color:var(--t1)}
.rtm{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--t2);margin-top:2px}
.rmsg{font-size:12px;color:var(--t3);margin-top:2px}

/* ── CHAT ── */
.cl{display:grid;grid-template-columns:220px 1fr;gap:14px;height:calc(100vh - 130px)}
.cs{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;display:flex;flex-direction:column}
.csh{padding:12px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;
  color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between}
.csl{flex:1;overflow-y:auto;padding:6px}
.si{padding:9px 11px;border-radius:7px;cursor:pointer;transition:.13s;margin-bottom:1px}
.si:hover{background:var(--bg3)}
.si.on{background:var(--vd)}
.sti{font-size:12.5px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sdt{font-size:10.5px;color:var(--t3);margin-top:1px;font-family:'JetBrains Mono',monospace}
.cm{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  display:flex;flex-direction:column;overflow:hidden}
.cmh{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.aibdg{background:var(--vd);border:1px solid rgba(139,92,246,.3);padding:3px 9px;border-radius:20px;
  font-size:10.5px;font-weight:700;color:var(--v);font-family:'JetBrains Mono',monospace}
.msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.ce{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);gap:8px}
.msg{display:flex;flex-direction:column;gap:3px;max-width:72%}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.assistant{align-self:flex-start;align-items:flex-start}
.mb{padding:10px 14px;border-radius:13px;font-size:13.5px;line-height:1.65;word-break:break-word}
.msg.user .mb{background:var(--v);color:#fff;border-radius:13px 13px 3px 13px}
.msg.assistant .mb{background:var(--bg3);color:var(--t1);border:1px solid var(--border);border-radius:13px 13px 13px 3px}
.mta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);padding:0 3px}
.cia{padding:13px 15px;border-top:1px solid var(--border);display:flex;gap:9px}
.ci{flex:1;padding:11px 14px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:11px;color:var(--t1);font-size:13.5px;resize:none;height:44px;transition:.15s}
.ci:focus{border-color:var(--v)}
.csend{padding:0 15px;background:var(--v);border-radius:11px;color:#fff;
  font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;transition:.13s}
.csend:hover{opacity:.86}
.csend:disabled{opacity:.4;cursor:not-allowed}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:fi .15s ease}
.mbox{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:26px;
  width:100%;max-width:450px;max-height:90vh;overflow-y:auto;animation:su .2s ease}
.mt{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:18px;color:var(--t1)}
.mf{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

/* ── EMPTY / ERROR / LOADING ── */
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;text-align:center;color:var(--t3)}
.emico{font-size:44px;margin-bottom:14px;opacity:.25}
.emtit{font-size:15px;font-weight:600;color:var(--t2);margin-bottom:6px}
.emsub{font-size:12.5px}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--v);
  border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
.lw{display:flex;align-items:center;justify-content:center;padding:40px}
.aibar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:9px}
.aibf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--v),var(--blue));transition:width .5s}

/* ── TOASTS ── */
#toasts{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.tst{padding:11px 16px;border-radius:9px;font-size:12.5px;font-weight:500;
  animation:su .2s ease,fo .3s ease 2.7s forwards;max-width:300px}
.tst-success{background:rgba(74,222,128,.13);border:1px solid rgba(74,222,128,.28);color:var(--green)}
.tst-error{background:rgba(248,113,113,.13);border:1px solid rgba(248,113,113,.28);color:var(--red)}
.tst-info{background:rgba(139,92,246,.13);border:1px solid rgba(139,92,246,.28);color:var(--v)}

/* ── ANIMS ── */
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes fo{from{opacity:1}to{opacity:0}}
@keyframes sp{to{transform:rotate(360deg)}}
.fade{animation:fi .2s ease}
.hidden{display:none!important}

/* ── AI PROGRESS BAR ── */

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sb{width:100%;min-height:auto;position:static;flex-direction:row;padding:10px;
    border-right:none;border-bottom:1px solid var(--border)}
  .sb-logo{padding:0 8px 0 0}
  .sb-nav{flex-direction:row}
  .ni span{display:none}
  .sb-foot{display:none}
  .mn{margin-left:0;padding:16px}
  .sg{grid-template-columns:repeat(2,1fr)}
  .cl{grid-template-columns:1fr;height:auto}
  .cs{display:none}
  #app{flex-direction:column}
}
</style>
</head>
<body>

<!-- ═══════ AUTH ═══════ -->
<div id="auth">
  <div class="auth-card">
    <div class="logo">Персональный <span>Ассистент</span></div>
    <p class="tagline" id="auth-tagline">Your intelligent personal assistant</p>
    <div class="tabs">
      <button class="tab on" id="tl" onclick="swTab('login')" data-i18n="auth_tab_signin">Sign in</button>
      <button class="tab" id="tr" onclick="swTab('reg')" data-i18n="auth_tab_register">Create account</button>
    </div>

    <div id="auth-err" style="display:none;background:rgba(248,113,113,.13);border:1px solid rgba(248,113,113,.3);
      border-radius:8px;padding:10px 13px;font-size:13px;color:var(--red);margin-bottom:14px;line-height:1.4"></div>

    <form id="lf" onsubmit="doLogin(event)">
      <div class="fg"><label class="fl" data-i18n="auth_email">Email</label>
        <input class="fi" type="email" id="le" placeholder="you@example.com" required></div>
      <div class="fg"><label class="fl" data-i18n="auth_password">Password</label>
        <input class="fi" type="password" id="lp" placeholder="••••••••" required></div>
      <button type="submit" class="btn-p" id="lb" data-i18n="auth_tab_signin">Sign in</button>
    </form>

    <form id="rf" class="hidden" onsubmit="doReg(event)">
      <div class="frow">
        <div class="fg"><label class="fl" data-i18n="auth_firstname">First name</label>
          <input class="fi" id="rfn" placeholder="Alex"></div>
        <div class="fg"><label class="fl" data-i18n="auth_lastname">Last name</label>
          <input class="fi" id="rln" placeholder="Smith"></div>
      </div>
      <div class="fg"><label class="fl" data-i18n="auth_email">Email</label>
        <input class="fi" type="email" id="re" placeholder="you@example.com" required></div>
      <div class="fg"><label class="fl" data-i18n="auth_password">Password</label>
        <input class="fi" type="password" id="rp" placeholder="Min 8 characters" required></div>
      <button type="submit" class="btn-p" id="rb" data-i18n="auth_tab_register">Create account</button>
    </form>
  </div>

  <!-- lang + theme controls on auth page -->
  <div id="auth-controls" style="position:fixed;top:16px;right:16px;display:flex;gap:6px;z-index:10">
    <button onclick="setLang('en')" id="auth-en" style="padding:5px 10px;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s">EN</button>
    <button onclick="setLang('ru')" id="auth-ru" style="padding:5px 10px;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);color:var(--t2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s">RU</button>

// ════════════════════════════════════════════
// API
// ════════════════════════════════════════════
async function api(method, path, body){
  const o={method,headers:{'Content-Type':'application/json'}};
  if(tok) o.headers['Authorization']='Bearer '+tok;
  if(body) o.body=JSON.stringify(body);
  try{
    const r=await fetch(path,o);
    if(r.status===401){
      if(path.startsWith('/api/v1/auth/')){
        throw new Error(lang==='ru'?'Неверный email или пароль. Проверьте данные и попробуйте снова.':'Invalid email or password. Please check your credentials.');
      }
      logout();return null;
    }
    if(r.status===204) return null;
    const d=await r.json().catch(()=>null);
    if(!r.ok) throw new Error(d?.message||'Error '+r.status);
    return d;
  }catch(e){
    if(e.message==='Failed to fetch') throw new Error('Cannot connect to server. Is the backend running?');
    throw e;
  }
}

function authErr(msg){
  const el=document.getElementById('auth-err');

  if(msg){el.textContent=msg;el.style.display='block';}
  else{el.textContent='';el.style.display='none';}
}
async function doLogin(e){
  e.preventDefault();
  authErr('');
  const b=document.getElementById('lb');
  b.disabled=true;b.textContent=lang==='ru'?'Вход…':'Signing in…';
  try{
    const d=await api('POST','/api/v1/auth/login',{email:v('le'),password:v('lp')});
    if(d) setMe(d);
  }catch(err){authErr(err.message)}
  finally{b.disabled=false;b.textContent=lang==='ru'?'Войти':'Sign in'}
}

  e.preventDefault();

function setMe(d){

async function lTasks(){

function pChat(){
  const el=pc();
  el.innerHTML=`

      </div>

async function lSessions(){
  const el=document.getElementById('slist'); if(!el) return;
  try{
    const d=await api('GET','/api/v1/chat/sessions?page=0&size=50&sort=createdAt,desc');
    if(!d){el.innerHTML=`<div style="padding:14px;text-align:center;font-size:12px;color:var(--t3)">${t('chat_no_sessions')}</div>`;return}
    const ss=d.content||[];
    const sc=document.getElementById('sc'); if(sc) sc.textContent=ss.length||'';
    if(!ss.length){el.innerHTML=`<div style="padding:14px;text-align:center;font-size:12px;color:var(--t3)">${t('chat_no_sessions')}</div>`;return}
    const locale=lang==='ru'?'ru-RU':'en-US';
    el.innerHTML=ss.map(s=>{
      const dt=s.createdAt?new Date(s.createdAt).toLocaleDateString(locale,{month:'short',day:'numeric'}):'';
      const active=chatSid===s.id||chatSid===Number(s.id);
      return `<div class="si ${active?'on':''}" onclick="openSess(${s.id},this)">
        <div class="sti">${esc(s.title)}</div><div class="sdt">${dt}</div></div>`;
    }).join('');
    // auto-restore last session when navigating back to chat
    if(chatSid){
      const activeEl=el.querySelector('.si.on');
      if(activeEl) openSess(chatSid,activeEl);
    } else if(ss.length){
      const first=el.querySelector('.si');
      if(first) openSess(ss[0].id,first);
    }
  }catch(e){el.innerHTML=`<div style="padding:14px;text-align:center;font-size:12px;color:var(--t3)">${t('err_connect')}</div>`}
}
async function openSess(id,el){
  chatSid=id;
  document.querySelectorAll('.si').forEach(e=>e.classList.remove('on'));
  el.classList.add('on');
  const msgs=document.getElementById('msgs'); if(!msgs) return;
  msgs.innerHTML=lw();
  try{
    const ms=await api('GET',`/api/v1/chat/sessions/${id}/messages`);
    if(!ms||!ms.length){msgs.innerHTML=`<div class="ce"><div style="font-size:28px;opacity:.2">💬</div><div style="font-size:13px;color:var(--t2)">${t('chat_start')}</div></div>`;return}
    msgs.innerHTML=ms.map(m=>bub(m.role,m.content,m.createdAt)).join('');
    msgs.scrollTop=msgs.scrollHeight;
    document.getElementById('ctit').textContent=el.querySelector('.sti').textContent;
  }catch(e){msgs.innerHTML=`<div class="ce"><div style="color:var(--t3)">${t('err_connect')}</div></div>`}
}
function newChat(){
  chatSid=null;
  document.querySelectorAll('.si').forEach(e=>e.classList.remove('on'));
  const msgs=document.getElementById('msgs'); if(msgs)
    msgs.innerHTML=`<div class="ce"><div style="font-size:38px;opacity:.2">🤖</div><div style="font-size:14px;font-weight:600;color:var(--t2)">${t('chat_start')}</div><div style="font-size:12px;margin-top:3px">${t('chat_ask')}</div></div>`;
  document.getElementById('ctit').textContent='New conversation';
  document.getElementById('ci')?.focus();
}
function mdToHtml(s){
  if(!s) return '';
  return esc(s)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code style="background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;font-family:monospace">$1</code>')
    .replace(/\n/g,'<br>');
}
function bub(role,content,ts,actions){
  const tm=ts?new Date(ts).toLocaleTimeString(lang==='ru'?'ru-RU':'en-US',{hour:'2-digit',minute:'2-digit'}):'';
  let actHtml='';
  if(actions&&actions.length){
    actHtml=`<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);">`
      +actions.map(a=>`<div style="font-size:11px;color:var(--t2);margin-top:4px">${esc(a)}</div>`).join('')
      +'</div>';
  }
  return `<div class="msg ${role}"><div class="mb">${mdToHtml(content)}${actHtml}</div><div class="mta">${tm}</div></div>`;
}
function ckd(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}}
async function sendMsg(){
  const inp=document.getElementById('ci');
  const msg=inp?.value?.trim(); if(!msg) return;
  const btn=document.getElementById('csnd'); btn.disabled=true;
  inp.value='';
  const msgs=document.getElementById('msgs'); if(!msgs) return;
  const ce=msgs.querySelector('.ce'); if(ce) ce.remove();
  const ud=document.createElement('div'); ud.innerHTML=bub('user',msg,new Date().toISOString());
  msgs.appendChild(ud.firstElementChild);
  const think=document.createElement('div');
  think.className='msg assistant'; think.id='think';
  think.innerHTML=`<div class="mb" style="color:var(--t3)"><div class="spin" style="width:14px;height:14px"></div></div>`;
  msgs.appendChild(think); msgs.scrollTop=msgs.scrollHeight;
  try{
    const d=await api('POST','/api/v1/chat',{message:msg,sessionId:chatSid||null});
    think.remove();
    if(d){
      chatSid=d.sessionId;
      document.getElementById('ctit').textContent=d.sessionTitle||t('chat_title');
      const ad=document.createElement('div');
      ad.innerHTML=bub('assistant',d.reply,d.timestamp,d.actionsPerformed);
      msgs.appendChild(ad.firstElementChild); msgs.scrollTop=msgs.scrollHeight;
      await lSessions();
    }
  }catch(e){think.remove();toast(e.message,'error')}
  finally{btn.disabled=false}
}

async function loadHealth(){
  const t0=performance.now();
  let health={};
  try{
    const r=await fetch('/actuator/health',{headers:tok?{Authorization:'Bearer '+tok}:{}});
    health=await r.json();
  }catch(e){health={status:'DOWN',error:e.message}}
  const ping=Math.round(performance.now()-t0);

  const up=health.status==='UP';
  const col=up?'#22c55e':'#ef4444';
  const ov=document.getElementById('hov');
  if(ov) ov.innerHTML=`
  <div style="background:${up?'rgba(34,197,94,.07)':'rgba(239,68,68,.07)'};border:1px solid ${up?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)'};border-radius:16px;padding:28px 32px;display:flex;align-items:center;gap:24px">
    <div style="width:56px;height:56px;border-radius:50%;background:${up?'rgba(34,197,94,.15)':'rgba(239,68,68,.15)'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <div style="width:20px;height:20px;border-radius:50%;background:${col};box-shadow:0 0 12px ${col}"></div>
    </div>
    <div style="flex:1">
      <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:${col}">${up?'All Systems Operational':'System Degraded'}</div>
      <div style="font-size:13px;color:var(--t2);margin-top:4px">Overall status: <b style="color:${col}">${health.status||'UNKNOWN'}</b> &nbsp;·&nbsp; Response time: <b style="color:var(--t1)">${ping}ms</b></div>
    </div>
    <div style="text-align:right;font-size:11px;color:var(--t3)">${new Date().toLocaleTimeString('ru-RU')}</div>
  </div>`;

  const comps=health.components||{};
  const services=[
    {key:'db',label:'PostgreSQL',icon:'🗄️',desc:'Primary database'},
    {key:'redis',label:'Redis',icon:'⚡',desc:'Cache & sessions'},
    {key:'kafka',label:'Kafka',icon:'📨',desc:'Event streaming'},
    {key:'diskSpace',label:'Disk Space',icon:'💾',desc:'Storage'},
    {key:'ping',label:'App Ping',icon:'🏓',desc:'Spring Boot'},
  ];

  const cards=document.getElementById('hcards');
  if(cards) cards.innerHTML=services.map(svc=>{
    const c=comps[svc.key];
    const st=c?c.status:(svc.key==='kafka'?'UNKNOWN':'UNKNOWN');
    const ok=st==='UP';
    const sc=ok?'#22c55e':st==='UNKNOWN'?'#f59e0b':'#ef4444';
    let detail='';
    if(svc.key==='db'&&c?.details?.database) detail=c.details.database;
    if(svc.key==='diskSpace'&&c?.details){
      const free=c.details.free;
      const total=c.details.total;
      if(free&&total){
        const freeMb=Math.round(free/1024/1024/1024*10)/10;
        const totalMb=Math.round(total/1024/1024/1024*10)/10;
        detail=`${freeMb}GB free / ${totalMb}GB total`;
      }
    }
    if(svc.key==='redis'&&c?.details?.version) detail='v'+c.details.version;
    return `<div style="background:var(--s1);border:1px solid var(--br);border-radius:12px;padding:20px;position:relative;overflow:hidden">
      <div style="position:absolute;top:0;right:0;width:80px;height:80px;background:${sc};opacity:.04;border-radius:0 12px 0 80px"></div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px">
        <div style="font-size:24px">${svc.icon}</div>
        <div style="display:flex;align-items:center;gap:6px;background:${ok?'rgba(34,197,94,.1)':st==='UNKNOWN'?'rgba(245,158,11,.1)':'rgba(239,68,68,.1)'};padding:4px 10px;border-radius:20px">
          <div style="width:6px;height:6px;border-radius:50%;background:${sc}"></div>
          <span style="font-size:11px;font-weight:600;color:${sc}">${st}</span>
        </div>
      </div>
      <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--t1)">${svc.label}</div>
      <div style="font-size:12px;color:var(--t3);margin-top:3px">${svc.desc}</div>
      ${detail?`<div style="font-size:11px;color:var(--t2);margin-top:10px;padding-top:10px;border-top:1px solid var(--br)">${esc(detail)}</div>`:''}
    </div>`;
  }).join('');

  // API endpoint ping table
  const endpoints=[
    {method:'GET',path:'/actuator/health',label:'Health check',pub:true},
    {method:'POST',path:'/api/v1/auth/login',label:'Auth login',pub:true},
    {method:'GET',path:'/api/v1/tasks',label:'Tasks API',pub:false},
    {method:'GET',path:'/api/v1/notes',label:'Notes API',pub:false},
    {method:'GET',path:'/api/v1/stats',label:'Stats API',pub:false},
    {method:'GET',path:'/api/v1/chat/sessions',label:'Chat sessions',pub:false},
  ];

  const hp=document.getElementById('hpings');
  if(hp){
    hp.innerHTML=`<div style="background:var(--s1);border:1px solid var(--br);border-radius:12px;overflow:hidden">
      <div style="padding:16px 20px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between">
        <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--t1)">API Endpoint Status</div>
        <div style="font-size:11px;color:var(--t3)">Live checks</div>
      </div>
      <div id="eptable"><div style="padding:20px">${lw()}</div></div>
    </div>`;
    checkEndpoints(endpoints);
  }
}

async function checkEndpoints(endpoints){
  const rows=await Promise.all(endpoints.map(async ep=>{
    const t=performance.now();
    let status=0,ok=false;
    try{
      const h={'Content-Type':'application/json'};
      if(!ep.pub&&tok) h['Authorization']='Bearer '+tok;
      const body=ep.method==='POST'&&ep.path.includes('login')?JSON.stringify({email:'__ping__',password:'__ping__'}):undefined;
      const r=await fetch(ep.path,{method:ep.method,headers:h,body});
      status=r.status;
      ok=status<500;
    }catch(e){status=0}
    const ms=Math.round(performance.now()-t);
    const stCol=status>=500||status===0?'#ef4444':status>=400?'#f59e0b':'#22c55e';
    const stLabel=status===0?'ERR':String(status);
    return `<div style="display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--br)">
      <span style="font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:4px;background:${ep.method==='GET'?'rgba(59,130,246,.15)':'rgba(168,85,247,.15)'};color:${ep.method==='GET'?'#60a5fa':'#c084fc'}">${ep.method}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t2);flex:1">${ep.path}</span>
      <span style="font-size:12px;color:var(--t3)">${ep.label}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);min-width:52px;text-align:right">${ms}ms</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${stCol};min-width:32px;text-align:right">${stLabel}</span>
    </div>`;
  }));
  const t=document.getElementById('eptable');
  if(t) t.innerHTML=rows.join('')+'<div style="height:1px"></div>';
}

// MODAL

function modal(html){
  const ov=document.createElement('div');
  ov.className='ov'; ov.id='modal-ov';
  ov.innerHTML=`<div class="mbox">${html}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove()});
  document.body.appendChild(ov);
  ov.querySelector('input,textarea')?.focus();
}
function closeModal(){document.getElementById('modal-ov')?.remove()}

// UTILS
// ════════════════════════════════════════════
function pc(){return document.getElementById('pc')}
function v(id){return document.getElementById(id)?.value?.trim()||''}
function lw(){return `<div class="lw"><div class="spin"></div></div>`}
function emp(ico,tit,sub){return `<div class="emp"><div class="emico">${ico}</div><div class="emtit">${tit}</div><div class="emsub">${sub}</div></div>`}
function errS(msg){return `<div class="emp"><div class="emico">⚠️</div><div class="emtit">Something went wrong</div><div class="emsub">${esc(msg)}</div></div>`}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(msg,type='info'){
  const el=document.createElement('div');
  el.className=`tst tst-${type}`; el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3100);
}
