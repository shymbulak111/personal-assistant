spring:
  application:
    name: personal-assistant

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:assistant_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    admin:
      fail-fast: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
    consumer:
      group-id: assistant-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "kz.projem.*"

  cache:
    type: redis
    redis:
      time-to-live: 600000

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 86400000   # 24h
    refresh-expiration: 604800000  # 7 days

  security:
    encryption-key: ${ENCRYPTION_KEY:Pr0JeM$ecretKey2026#AES256GCMenc!}

  ai:
    provider: ${AI_PROVIDER:groq}
    api-key: ${AI_API_KEY:your-api-key-here}
    base-url: ${AI_BASE_URL:https://api.groq.com/openai/v1}
    model: ${AI_MODEL:openai/gpt-oss-120b}
    max-tokens: 1024
    timeout: 30

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    kz.projem: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
