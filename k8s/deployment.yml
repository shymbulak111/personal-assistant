apiVersion: apps/v1
kind: Deployment
metadata:
  name: personal-assistant
  labels:
    app: personal-assistant
spec:
  replicas: 2
  selector:
    matchLabels:
      app: personal-assistant
  template:
    metadata:
      labels:
        app: personal-assistant
    spec:
      containers:
        - name: app
          image: your-dockerhub/personal-assistant:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: assistant-config
            - secretRef:
                name: assistant-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
